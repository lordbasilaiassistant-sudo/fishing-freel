# Render blueprint — free static site for FishingF'reel.
# One-click: https://render.com/deploy?repo=https://github.com/lordbasilaiassistant-sudo/fishing-freel
services:
  - type: web
    runtime: static
    name: fishing-freel
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    routes:
      # SPA fallback so client-side state/routes resolve to index.html
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
